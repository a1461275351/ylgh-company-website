#user  nobody;
worker_processes 4;
worker_rlimit_nofile 100000;

# 修正：原配置末尾 `error_log C:/soft/phpstudy_pro/WWW crit;` 指向的是目录不是文件，会报错。
error_log  logs/error.log  crit;
#pid        logs/nginx.pid;

events {
    worker_connections 40960;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    #log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
    #                  '$status $body_bytes_sent "$http_referer" '
    #                  '"$http_user_agent" "$http_x_forwarded_for"';
    #access_log  logs/access.log  main;

    sendfile           on;
    keepalive_timeout  65;
    charset            utf-8;
    #gzip  on;

    # ============================================================
    #  关键修复点（解决搜索结果显示 IP 而非域名）
    #  1) 80 端口用 default_server 兜底，任何 host(IP/www/未知) 一律 301 到 https 域名
    #     —— 原配置用的是 $host，会把 47.109.192.2 原样保留，所以一直跳不到域名
    #  2) 443 增加 default_server 兜底块，用 IP 走 https 访问的也拍回域名
    #  3) 真正的站点只服务 ylghtrade.com / www.ylghtrade.com
    # ============================================================

    # ---- (1) 80 端口：全部跳到 https + 规范域名 ----
    server {
        listen       80 default_server;
        server_name  _;
        return 301 https://ylghtrade.com$request_uri;   # 写死域名，不要用 $host
    }

    # ---- (2) 443 兜底：直接用 IP / 未知域名走 https 的，301 回规范域名 ----
    #     用 IP 访问 https 会有证书名不匹配告警（证书是签给域名的，无法避免），
    #     但搜索引擎拿到 301 就够了；等 IP 被剔出索引后这条路径也没人走。
    #     若想让 https://IP 直接打不开，把下面 return 那行换成： ssl_reject_handshake on;
    server {
        listen       443 ssl default_server;
        server_name  _;
        ssl_certificate     C:/soft/cert/ylghtrade.com.pem;
        ssl_certificate_key C:/soft/cert/ylghtrade.com.key;
        return 301 https://ylghtrade.com$request_uri;
    }

    # ---- (3) 真正的站点 ----
    server {
        listen       443 ssl;
        server_name  ylghtrade.com www.ylghtrade.com;

        ssl_certificate            C:/soft/cert/ylghtrade.com.pem;
        ssl_certificate_key        C:/soft/cert/ylghtrade.com.key;
        ssl_session_cache          shared:SSL:1m;
        ssl_session_timeout        5m;
        ssl_ciphers                HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers  on;

        location / {
            root       C:/soft/phpstudy_pro/Extensions/Nginx1.25.2/html/my-website;
            try_files  $uri $uri/ /index.html;
            index      index.html index.htm;
        }

        location ~ ^/(admin|api|uploads) {
            proxy_set_header Host              $http_host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header REMOTE-HOST       $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;   # 让后端知道外层是 https
            proxy_pass http://localhost:8081;
            #proxy_pass http://47.109.192.2:8081;
        }
    }

    client_max_body_size      50m;
    client_body_buffer_size   60k;
    client_body_timeout       60;
    client_header_buffer_size 64k;
    client_header_timeout     60;

    error_page 400 /error/400.html;
    error_page 403 /error/403.html;
    error_page 404 /error/404.html;
    error_page 500 /error/500.html;
    error_page 501 /error/501.html;
    error_page 502 /error/502.html;
    error_page 503 /error/503.html;
    error_page 504 /error/504.html;
    error_page 505 /error/505.html;
    error_page 506 /error/506.html;
    error_page 507 /error/507.html;
    error_page 509 /error/509.html;
    error_page 510 /error/510.html;

    keepalive_requests          100;
    large_client_header_buffers 4 64k;
    reset_timedout_connection   on;
    send_timeout                60;
    sendfile_max_chunk          512k;
    server_names_hash_bucket_size 256;
}
