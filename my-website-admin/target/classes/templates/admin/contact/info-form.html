<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>编辑联系信息 - 国合后台</title><link rel="stylesheet" th:href="@{/admin/css/admin.css}"></head>
<body>
<div th:replace="admin/fragments/sidebar :: sidebar"></div>
<div class="main-content">
    <div class="top-header"><div class="breadcrumb"><a href="/admin">控制台</a> / <a href="/admin/contact/info">联系信息</a> / <span>编辑</span></div></div>
    <div class="content-area">
        <div class="card"><div class="card-header"><h3 th:text="${contact.id != null} ? '编辑联系信息' : '添加联系信息'"></h3></div>
            <div class="card-body">
                <form th:action="@{/admin/contact/info/save}" method="post" th:object="${contact}">
                    <input type="hidden" th:field="*{id}">
                    <div class="form-row">
                        <div class="form-group"><label>类型 *</label>
                            <select class="form-control" th:field="*{type}" required><option value="">请选择</option>
                                <option th:each="t : ${types}" th:value="${t}" th:text="${t.label}"></option></select></div>
                        <div class="form-group"><label>城市</label><input type="text" class="form-control" th:field="*{city}"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>国家</label><input type="text" class="form-control" th:field="*{country}"></div>
                        <div class="form-group"><label>地址</label><input type="text" class="form-control" th:field="*{address}"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>电话</label><input type="text" class="form-control" th:field="*{phone}"></div>
                        <div class="form-group"><label>邮箱</label><input type="email" class="form-control" th:field="*{email}"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>微信</label><input type="text" class="form-control" th:field="*{wechat}"></div>
                        <div class="form-group"><label>WhatsApp</label><input type="text" class="form-control" th:field="*{whatsapp}"></div>
                    </div>
                    <div class="form-group"><label>营业时间</label><input type="text" class="form-control" th:field="*{hours}"></div>
                    <div class="form-group"><label>仓储规模（海外）</label><input type="text" class="form-control" th:field="*{warehouseSize}"></div>
                    <div class="form-group"><label>排序</label><input type="number" class="form-control" th:field="*{sortOrder}" value="0"></div>
                    <div class="form-actions"><button type="submit" class="btn btn-primary">保存</button><a href="/admin/contact/info" class="btn btn-outline">取消</a></div>
                </form>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/admin/js/admin.js}"></script>
</body></html>
