<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>编辑路线 - 国合后台</title><link rel="stylesheet" th:href="@{/admin/css/admin.css}"></head>
<body>
<div th:replace="admin/fragments/sidebar :: sidebar"></div>
<div class="main-content">
    <div class="top-header"><div class="breadcrumb"><a href="/admin">控制台</a> / <a href="/admin/global/routes">物流路线</a> / <span>编辑</span></div></div>
    <div class="content-area">
        <div class="card"><div class="card-header"><h3 th:text="${route.id != null} ? '编辑路线' : '添加路线'"></h3></div>
            <div class="card-body">
                <form th:action="@{/admin/global/routes/save}" method="post" th:object="${route}">
                    <input type="hidden" th:field="*{id}">
                    <div class="form-row">
                        <div class="form-group"><label>类型 *</label>
                            <select class="form-control" th:field="*{type}" required><option value="">请选择</option>
                                <option th:each="t : ${types}" th:value="${t}" th:text="${t.label}"></option></select></div>
                        <div class="form-group"><label>名称 *</label><input type="text" class="form-control" th:field="*{name}" required></div>
                    </div>
                    <div class="form-group"><label>城市路径</label><input type="text" class="form-control" th:field="*{cities}" placeholder="如：西安 → 莫斯科"></div>
                    <div class="form-row">
                        <div class="form-group"><label>频次</label><input type="text" class="form-control" th:field="*{frequency}" placeholder="如：每月3列"></div>
                        <div class="form-group"><label>时效</label><input type="text" class="form-control" th:field="*{transitTime}" placeholder="如：约15天"></div>
                    </div>
                    <div class="form-group"><label>描述</label><textarea class="form-control" th:field="*{description}" rows="3"></textarea></div>
                    <div class="form-row">
                        <div class="form-group"><label>图标</label><input type="text" class="form-control" th:field="*{icon}"></div>
                        <div class="form-group"><label>排序</label><input type="number" class="form-control" th:field="*{sortOrder}" value="0"></div>
                    </div>
                    <div class="form-actions"><button type="submit" class="btn btn-primary">保存</button><a href="/admin/global/routes" class="btn btn-outline">取消</a></div>
                </form>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/admin/js/admin.js}"></script>
</body></html>
