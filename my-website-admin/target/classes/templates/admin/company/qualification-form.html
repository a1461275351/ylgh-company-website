<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>编辑资质 - 国合后台</title><link rel="stylesheet" th:href="@{/admin/css/admin.css}"></head>
<body>
<div th:replace="admin/fragments/sidebar :: sidebar"></div>
<div class="main-content">
    <div class="top-header"><div class="breadcrumb"><a href="/admin">控制台</a> / <a href="/admin/company/qualifications">资质荣誉</a> / <span>编辑</span></div></div>
    <div class="content-area">
        <div class="card"><div class="card-header"><h3 th:text="${qualification.id != null} ? '编辑资质' : '添加资质'"></h3></div>
            <div class="card-body">
                <form th:action="@{/admin/company/qualifications/save}" method="post" th:object="${qualification}">
                    <input type="hidden" th:field="*{id}">
                    <div class="form-row">
                        <div class="form-group"><label>名称 *</label><input type="text" class="form-control" th:field="*{title}" required></div>
                        <div class="form-group"><label>图标</label><input type="text" class="form-control" th:field="*{icon}" placeholder="🏆"></div>
                    </div>
                    <div class="form-group"><label>描述</label><textarea class="form-control" th:field="*{description}" rows="3"></textarea></div>
                    <div class="form-row">
                        <div class="form-group"><label>排序</label><input type="number" class="form-control" th:field="*{sortOrder}" value="0"></div>
                        <div class="form-group"><label>&nbsp;</label><div class="form-check"><input type="checkbox" th:field="*{active}" id="active"><label for="active">启用</label></div></div>
                    </div>
                    <div class="form-actions"><button type="submit" class="btn btn-primary">保存</button><a href="/admin/company/qualifications" class="btn btn-outline">取消</a></div>
                </form>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/admin/js/admin.js}"></script>
</body></html>
