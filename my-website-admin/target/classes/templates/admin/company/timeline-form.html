<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>编辑里程碑 - 国合后台</title><link rel="stylesheet" th:href="@{/admin/css/admin.css}"></head>
<body>
<div th:replace="admin/fragments/sidebar :: sidebar"></div>
<div class="main-content">
    <div class="top-header"><div class="breadcrumb"><a href="/admin">控制台</a> / <a href="/admin/company/timeline">发展历程</a> / <span>编辑</span></div></div>
    <div class="content-area">
        <div class="card"><div class="card-header"><h3 th:text="${timeline.id != null} ? '编辑里程碑' : '添加里程碑'"></h3></div>
            <div class="card-body">
                <form th:action="@{/admin/company/timeline/save}" method="post" th:object="${timeline}">
                    <input type="hidden" th:field="*{id}">
                    <div class="form-row">
                        <div class="form-group"><label>年份 *</label><input type="text" class="form-control" th:field="*{year}" required placeholder="如：2025.Q1"></div>
                        <div class="form-group"><label>图标</label><input type="text" class="form-control" th:field="*{icon}" placeholder="如：🏢"></div>
                    </div>
                    <div class="form-group"><label>标题 *</label><input type="text" class="form-control" th:field="*{title}" required></div>
                    <div class="form-group"><label>描述</label><textarea class="form-control" th:field="*{description}" rows="4"></textarea></div>
                    <div class="form-row">
                        <div class="form-group"><label>排序</label><input type="number" class="form-control" th:field="*{sortOrder}" value="0"></div>
                        <div class="form-group"><label>&nbsp;</label><div class="form-check"><input type="checkbox" th:field="*{highlight}" id="highlight"><label for="highlight">高亮显示</label></div></div>
                    </div>
                    <div class="form-actions"><button type="submit" class="btn btn-primary">保存</button><a href="/admin/company/timeline" class="btn btn-outline">取消</a></div>
                </form>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/admin/js/admin.js}"></script>
</body></html>
