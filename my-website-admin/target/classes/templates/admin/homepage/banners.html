<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>轮播图管理 - 国合后台</title><link rel="stylesheet" th:href="@{/admin/css/admin.css}"></head>
<body>
<div th:replace="admin/fragments/sidebar :: sidebar"></div>
<div class="main-content">
    <div class="top-header"><div class="breadcrumb"><a href="/admin">控制台</a> / <span>轮播图管理</span></div></div>
    <div class="content-area">
        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
        <div class="card">
            <div class="card-header"><h3>轮播图列表</h3><a href="/admin/homepage/banners/new" class="btn btn-primary">+ 添加轮播图</a></div>
            <div class="card-body"><div class="table-wrapper"><table>
                <thead><tr><th>排序</th><th>标签</th><th>标题</th><th>按钮文字</th><th>状态</th><th>操作</th></tr></thead>
                <tbody>
                <tr th:each="b : ${banners}">
                    <td th:text="${b.sortOrder}"></td><td class="text-truncate" th:text="${b.tag}"></td><td><strong th:text="${b.title}"></strong></td>
                    <td th:text="${b.ctaText}"></td>
                    <td><span class="badge" th:classappend="${b.active} ? 'badge-green' : 'badge-gray'" th:text="${b.active} ? '启用' : '禁用'"></span></td>
                    <td><div class="btn-group"><a th:href="@{'/admin/homepage/banners/' + ${b.id} + '/edit'}" class="btn btn-outline btn-sm">编辑</a>
                        <form th:action="@{'/admin/homepage/banners/' + ${b.id} + '/delete'}" method="post" data-confirm="确认删除？" style="display:inline;"><button type="submit" class="btn btn-danger btn-sm">删除</button></form></div></td>
                </tr></tbody>
            </table></div></div>
        </div>
    </div>
</div>
<script th:src="@{/admin/js/admin.js}"></script>
</body></html>
