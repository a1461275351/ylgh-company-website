<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>联系信息 - 国合后台</title><link rel="stylesheet" th:href="@{/admin/css/admin.css}"></head>
<body>
<div th:replace="admin/fragments/sidebar :: sidebar"></div>
<div class="main-content">
    <div class="top-header"><div class="breadcrumb"><a href="/admin">控制台</a> / <span>联系信息</span></div></div>
    <div class="content-area">
        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
        <div class="card">
            <div class="card-header"><h3>联系信息管理</h3><a href="/admin/contact/info/new" class="btn btn-primary">+ 添加</a></div>
            <div class="card-body"><div class="table-wrapper"><table>
                <thead><tr><th>排序</th><th>类型</th><th>城市</th><th>国家</th><th>电话</th><th>邮箱</th><th>操作</th></tr></thead>
                <tbody><tr th:each="c : ${contacts}">
                    <td th:text="${c.sortOrder}"></td>
                    <td><span class="badge" th:classappend="${c.type.name() == 'MAIN'} ? 'badge-gold' : 'badge-blue'" th:text="${c.type.label}"></span></td>
                    <td><strong th:text="${c.city}"></strong></td><td th:text="${c.country}"></td>
                    <td th:text="${c.phone}"></td><td th:text="${c.email}"></td>
                    <td><div class="btn-group"><a th:href="@{'/admin/contact/info/' + ${c.id} + '/edit'}" class="btn btn-outline btn-sm">编辑</a>
                        <form th:action="@{'/admin/contact/info/' + ${c.id} + '/delete'}" method="post" data-confirm="确认删除？" style="display:inline;"><button type="submit" class="btn btn-danger btn-sm">删除</button></form></div></td>
                </tr></tbody>
            </table></div></div>
        </div>
    </div>
</div>
<script th:src="@{/admin/js/admin.js}"></script>
</body></html>
