<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>询盘详情 - 国合后台</title><link rel="stylesheet" th:href="@{/admin/css/admin.css}"></head>
<body>
<div th:replace="admin/fragments/sidebar :: sidebar"></div>
<div class="main-content">
    <div class="top-header"><div class="breadcrumb"><a href="/admin">控制台</a> / <a href="/admin/contact/inquiries">客户询盘</a> / <span>详情</span></div></div>
    <div class="content-area">
        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 20px;">
            <div class="card">
                <div class="card-header"><h3>询盘信息</h3>
                    <span class="badge" th:classappend="${inquiry.status.name() == 'PENDING'} ? 'badge-red' : (${inquiry.status.name() == 'PROCESSING'} ? 'badge-gold' : 'badge-green')" th:text="${inquiry.status.label}"></span>
                </div>
                <div class="card-body">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px;">
                        <div><label style="font-size:12px;color:#999;">姓名</label><div th:text="${inquiry.name}"></div></div>
                        <div><label style="font-size:12px;color:#999;">公司</label><div th:text="${inquiry.company}"></div></div>
                        <div><label style="font-size:12px;color:#999;">电话</label><div th:text="${inquiry.phone}"></div></div>
                        <div><label style="font-size:12px;color:#999;">邮箱</label><div th:text="${inquiry.email ?: '未填写'}"></div></div>
                        <div><label style="font-size:12px;color:#999;">国家/地区</label><div th:text="${inquiry.country}"></div></div>
                        <div><label style="font-size:12px;color:#999;">咨询类型</label><div><span class="badge badge-blue" th:text="${inquiry.inquiryType.label}"></span></div></div>
                    </div>
                    <div style="border-top:1px solid #eee;padding-top:16px;">
                        <label style="font-size:12px;color:#999;">询盘内容</label>
                        <div style="background:#f9f9f9;padding:16px;border-radius:8px;margin-top:8px;line-height:1.8;" th:text="${inquiry.message}"></div>
                    </div>
                    <div th:if="${inquiry.adminNote}" style="border-top:1px solid #eee;padding-top:16px;margin-top:16px;">
                        <label style="font-size:12px;color:#999;">管理员备注</label>
                        <div style="background:#fff8e1;padding:16px;border-radius:8px;margin-top:8px;" th:text="${inquiry.adminNote}"></div>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="card-header"><h3>更新状态</h3></div>
                <div class="card-body">
                    <form th:action="@{'/admin/contact/inquiries/' + ${inquiry.id} + '/status'}" method="post">
                        <div class="form-group"><label>状态</label>
                            <select name="status" class="form-control">
                                <option th:each="s : ${statuses}" th:value="${s.name()}" th:text="${s.label}" th:selected="${inquiry.status == s}"></option>
                            </select>
                        </div>
                        <div class="form-group"><label>管理员备注</label>
                            <textarea name="adminNote" class="form-control" rows="4" th:text="${inquiry.adminNote}"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width:100%;">更新状态</button>
                    </form>
                    <div style="margin-top:16px;font-size:12px;color:#999;">
                        <div>创建时间：<span th:text="${#temporals.format(inquiry.createdAt, 'yyyy-MM-dd HH:mm:ss')}"></span></div>
                        <div th:if="${inquiry.updatedAt}">更新时间：<span th:text="${#temporals.format(inquiry.updatedAt, 'yyyy-MM-dd HH:mm:ss')}"></span></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/admin/js/admin.js}"></script>
</body></html>
