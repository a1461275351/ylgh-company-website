<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>客户询盘 - 国合后台</title><link rel="stylesheet" th:href="@{/admin/css/admin.css}"></head>
<body>
<div th:replace="admin/fragments/sidebar :: sidebar"></div>
<div class="main-content">
    <div class="top-header"><div class="breadcrumb"><a href="/admin">控制台</a> / <span>客户询盘</span></div></div>
    <div class="content-area">
        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
        <div class="card">
            <div class="card-header"><h3>询盘列表</h3></div>
            <div class="card-body">
                <div class="filter-tabs">
                    <a class="filter-tab" th:classappend="${selectedStatus == null} ? 'active'" href="/admin/contact/inquiries">全部</a>
                    <a th:each="s : ${statuses}" class="filter-tab" th:classappend="${selectedStatus != null and selectedStatus.toUpperCase() == s.name()} ? 'active'"
                       th:href="@{/admin/contact/inquiries(status=${s.name()})}" th:text="${s.label}"></a>
                </div>
                <div class="table-wrapper"><table>
                    <thead><tr><th>姓名</th><th>公司</th><th>电话</th><th>国家</th><th>咨询类型</th><th>状态</th><th>时间</th><th>操作</th></tr></thead>
                    <tbody><tr th:each="i : ${inquiries}">
                        <td><strong th:text="${i.name}"></strong></td><td th:text="${i.company}"></td><td th:text="${i.phone}"></td>
                        <td th:text="${i.country}"></td>
                        <td><span class="badge badge-blue" th:text="${i.inquiryType.label}"></span></td>
                        <td><span class="badge" th:classappend="${i.status.name() == 'PENDING'} ? 'badge-red' : (${i.status.name() == 'PROCESSING'} ? 'badge-gold' : (${i.status.name() == 'REPLIED'} ? 'badge-green' : 'badge-gray'))" th:text="${i.status.label}"></span></td>
                        <td th:text="${#temporals.format(i.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                        <td><a th:href="@{'/admin/contact/inquiries/' + ${i.id}}" class="btn btn-outline btn-sm">查看</a></td>
                    </tr></tbody>
                </table></div>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/admin/js/admin.js}"></script>
</body></html>
