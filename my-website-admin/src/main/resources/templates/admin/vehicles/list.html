<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>车辆目的地 - 国合后台</title><link rel="stylesheet" th:href="@{/admin/css/admin.css}"></head>
<body>
<div th:replace="admin/fragments/sidebar :: sidebar"></div>
<div class="main-content">
    <div class="top-header"><div class="breadcrumb"><a href="/admin">控制台</a> / <span>二手车出口目的地</span></div></div>
    <div class="content-area">
        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
        <div class="card">
            <div class="card-header"><h3>目的地列表</h3><a href="/admin/vehicles/new" class="btn btn-primary">+ 添加目的地</a></div>
            <div class="card-body">
                <div class="table-wrapper"><table>
                    <thead><tr><th>排序</th><th>国旗</th><th>国家</th><th>描述</th><th>状态</th><th>操作</th></tr></thead>
                    <tbody>
                    <tr th:each="v : ${vehicles}">
                        <td th:text="${v.sortOrder}"></td><td th:text="${v.flag}"></td><td><strong th:text="${v.country}"></strong></td>
                        <td th:text="${v.description}"></td>
                        <td><span class="badge" th:classappend="${v.active} ? 'badge-green' : 'badge-gray'" th:text="${v.active} ? '启用' : '禁用'"></span></td>
                        <td><div class="btn-group"><a th:href="@{'/admin/vehicles/' + ${v.id} + '/edit'}" class="btn btn-outline btn-sm">编辑</a>
                            <form th:action="@{'/admin/vehicles/' + ${v.id} + '/delete'}" method="post" data-confirm="确认删除？" style="display:inline;"><button type="submit" class="btn btn-danger btn-sm">删除</button></form></div></td>
                    </tr></tbody>
                </table></div>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/admin/js/admin.js}"></script>
</body></html>
