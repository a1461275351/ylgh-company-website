<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>海外仓储 - 国合后台</title><link rel="stylesheet" th:href="@{/admin/css/admin.css}"></head>
<body>
<div th:replace="admin/fragments/sidebar :: sidebar"></div>
<div class="main-content">
    <div class="top-header"><div class="breadcrumb"><a href="/admin">控制台</a> / <span>海外仓储</span></div></div>
    <div class="content-area">
        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
        <div class="card">
            <div class="card-header"><h3>仓库列表</h3><a href="/admin/global/warehouses/new" class="btn btn-primary">+ 添加仓库</a></div>
            <div class="card-body"><div class="table-wrapper"><table>
                <thead><tr><th>排序</th><th>国旗</th><th>城市</th><th>国家</th><th>面积</th><th>特色</th><th>操作</th></tr></thead>
                <tbody><tr th:each="w : ${warehouses}">
                    <td th:text="${w.sortOrder}"></td><td th:text="${w.flag}"></td><td><strong th:text="${w.city}"></strong></td>
                    <td th:text="${w.country}"></td><td th:text="${w.size}"></td><td class="text-truncate" th:text="${w.features}"></td>
                    <td><div class="btn-group"><a th:href="@{'/admin/global/warehouses/' + ${w.id} + '/edit'}" class="btn btn-outline btn-sm">编辑</a>
                        <form th:action="@{'/admin/global/warehouses/' + ${w.id} + '/delete'}" method="post" data-confirm="确认删除？" style="display:inline;"><button type="submit" class="btn btn-danger btn-sm">删除</button></form></div></td>
                </tr></tbody>
            </table></div></div>
        </div>
    </div>
</div>
<script th:src="@{/admin/js/admin.js}"></script>
</body></html>
