<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>编辑仓库 - 国合后台</title><link rel="stylesheet" th:href="@{/admin/css/admin.css}"></head>
<body>
<div th:replace="admin/fragments/sidebar :: sidebar"></div>
<div class="main-content">
    <div class="top-header"><div class="breadcrumb"><a href="/admin">控制台</a> / <a href="/admin/global/warehouses">海外仓储</a> / <span>编辑</span></div></div>
    <div class="content-area">
        <div class="card"><div class="card-header"><h3 th:text="${warehouse.id != null} ? '编辑仓库' : '添加仓库'"></h3></div>
            <div class="card-body">
                <form th:action="@{/admin/global/warehouses/save}" method="post" th:object="${warehouse}">
                    <input type="hidden" th:field="*{id}">
                    <div class="form-row">
                        <div class="form-group"><label>城市 *</label><input type="text" class="form-control" th:field="*{city}" required></div>
                        <div class="form-group"><label>国家 *</label><input type="text" class="form-control" th:field="*{country}" required></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>国旗</label><input type="text" class="form-control" th:field="*{flag}" placeholder="🇷🇺"></div>
                        <div class="form-group"><label>面积 *</label><input type="text" class="form-control" th:field="*{size}" required placeholder="如：2,000 ㎡"></div>
                    </div>
                    <div class="form-group"><label>描述</label><textarea class="form-control" th:field="*{description}" rows="3"></textarea></div>
                    <div class="form-group"><label>特色功能（逗号分隔）</label><input type="text" class="form-control" th:field="*{features}" placeholder="如：常温·冷藏分区,数字化管理"></div>
                    <div class="form-group"><label>覆盖能力</label><input type="text" class="form-control" th:field="*{capabilities}"></div>
                    <div class="form-group"><label>排序</label><input type="number" class="form-control" th:field="*{sortOrder}" value="0"></div>
                    <div class="form-actions"><button type="submit" class="btn btn-primary">保存</button><a href="/admin/global/warehouses" class="btn btn-outline">取消</a></div>
                </form>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/admin/js/admin.js}"></script>
</body></html>
