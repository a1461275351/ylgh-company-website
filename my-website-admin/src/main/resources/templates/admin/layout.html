<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle != null} ? ${pageTitle} + ' - 国合后台管理' : '国合后台管理系统'">国合后台管理系统</title>
    <link rel="stylesheet" th:href="@{/admin/css/admin.css}">
</head>
<body>
    <div th:replace="admin/fragments/sidebar :: sidebar"></div>

    <div class="main-content">
        <div class="top-header">
            <div class="breadcrumb" th:if="${breadcrumb != null}" th:text="${breadcrumb}"></div>
            <div class="breadcrumb" th:if="${breadcrumb == null}">后台管理系统</div>
        </div>

        <div class="content-area">
            <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
            <div th:replace="${content}"></div>
        </div>
    </div>

    <script th:src="@{/admin/js/admin.js}"></script>
</body>
</html>
