<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>发展历程 - 国合后台</title><link rel="stylesheet" th:href="@{/admin/css/admin.css}"></head>
<body>
<div th:replace="admin/fragments/sidebar :: sidebar"></div>
<div class="main-content">
    <div class="top-header"><div class="breadcrumb"><a href="/admin">控制台</a> / <span>发展历程</span></div></div>
    <div class="content-area">
        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
        <div class="card">
            <div class="card-header"><h3>发展里程碑</h3><a href="/admin/company/timeline/new" class="btn btn-primary">+ 添加里程碑</a></div>
            <div class="card-body"><div class="table-wrapper"><table>
                <thead><tr><th>排序</th><th>图标</th><th>年份</th><th>标题</th><th>描述</th><th>高亮</th><th>操作</th></tr></thead>
                <tbody><tr th:each="t : ${timelines}">
                    <td th:text="${t.sortOrder}"></td><td th:text="${t.icon}"></td><td><strong th:text="${t.year}"></strong></td>
                    <td th:text="${t.title}"></td><td class="text-truncate" th:text="${t.description}"></td>
                    <td><span class="badge" th:classappend="${t.highlight} ? 'badge-gold' : 'badge-gray'" th:text="${t.highlight} ? '高亮' : '普通'"></span></td>
                    <td><div class="btn-group"><a th:href="@{'/admin/company/timeline/' + ${t.id} + '/edit'}" class="btn btn-outline btn-sm">编辑</a>
                        <form th:action="@{'/admin/company/timeline/' + ${t.id} + '/delete'}" method="post" data-confirm="确认删除？" style="display:inline;"><button type="submit" class="btn btn-danger btn-sm">删除</button></form></div></td>
                </tr></tbody>
            </table></div></div>
        </div>
    </div>
</div>
<script th:src="@{/admin/js/admin.js}"></script>
</body></html>
