<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>资质荣誉 - 国合后台</title><link rel="stylesheet" th:href="@{/admin/css/admin.css}"></head>
<body>
<div th:replace="admin/fragments/sidebar :: sidebar"></div>
<div class="main-content">
    <div class="top-header"><div class="breadcrumb"><a href="/admin">控制台</a> / <span>资质荣誉</span></div></div>
    <div class="content-area">
        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
        <div class="card">
            <div class="card-header"><h3>资质列表</h3><a href="/admin/company/qualifications/new" class="btn btn-primary">+ 添加资质</a></div>
            <div class="card-body"><div class="table-wrapper"><table>
                <thead><tr><th>排序</th><th>图标</th><th>名称</th><th>描述</th><th>状态</th><th>操作</th></tr></thead>
                <tbody><tr th:each="q : ${qualifications}">
                    <td th:text="${q.sortOrder}"></td><td th:text="${q.icon}"></td><td><strong th:text="${q.title}"></strong></td>
                    <td class="text-truncate" th:text="${q.description}"></td>
                    <td><span class="badge" th:classappend="${q.active} ? 'badge-green' : 'badge-gray'" th:text="${q.active} ? '启用' : '禁用'"></span></td>
                    <td><div class="btn-group"><a th:href="@{'/admin/company/qualifications/' + ${q.id} + '/edit'}" class="btn btn-outline btn-sm">编辑</a>
                        <form th:action="@{'/admin/company/qualifications/' + ${q.id} + '/delete'}" method="post" data-confirm="确认删除？" style="display:inline;"><button type="submit" class="btn btn-danger btn-sm">删除</button></form></div></td>
                </tr></tbody>
            </table></div></div>
        </div>
    </div>
</div>
<script th:src="@{/admin/js/admin.js}"></script>
</body></html>
