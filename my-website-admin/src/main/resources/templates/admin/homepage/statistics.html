<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>数据统计 - 国合后台</title><link rel="stylesheet" th:href="@{/admin/css/admin.css}"></head>
<body>
<div th:replace="admin/fragments/sidebar :: sidebar"></div>
<div class="main-content">
    <div class="top-header"><div class="breadcrumb"><a href="/admin">控制台</a> / <span>数据统计管理</span></div></div>
    <div class="content-area">
        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
        <div class="card">
            <div class="card-header"><h3>统计数据</h3><a href="/admin/homepage/statistics/new" class="btn btn-primary">+ 添加统计</a></div>
            <div class="card-body"><div class="table-wrapper"><table>
                <thead><tr><th>排序</th><th>图标</th><th>标签</th><th>数值</th><th>单位</th><th>分区</th><th>操作</th></tr></thead>
                <tbody><tr th:each="s : ${statistics}">
                    <td th:text="${s.sortOrder}"></td><td th:text="${s.icon}"></td><td th:text="${s.label}"></td>
                    <td><strong th:text="${s.value}"></strong></td><td th:text="${s.unit}"></td><td><span class="badge badge-blue" th:text="${s.section}"></span></td>
                    <td><div class="btn-group"><a th:href="@{'/admin/homepage/statistics/' + ${s.id} + '/edit'}" class="btn btn-outline btn-sm">编辑</a>
                        <form th:action="@{'/admin/homepage/statistics/' + ${s.id} + '/delete'}" method="post" data-confirm="确认删除？" style="display:inline;"><button type="submit" class="btn btn-danger btn-sm">删除</button></form></div></td>
                </tr></tbody>
            </table></div></div>
        </div>
    </div>
</div>
<script th:src="@{/admin/js/admin.js}"></script>
</body></html>
