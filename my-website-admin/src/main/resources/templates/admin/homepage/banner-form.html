<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>编辑轮播图 - 国合后台</title><link rel="stylesheet" th:href="@{/admin/css/admin.css}"></head>
<body>
<div th:replace="admin/fragments/sidebar :: sidebar"></div>
<div class="main-content">
    <div class="top-header"><div class="breadcrumb"><a href="/admin">控制台</a> / <a href="/admin/homepage/banners">轮播图</a> / <span>编辑</span></div></div>
    <div class="content-area">
        <div class="card"><div class="card-header"><h3 th:text="${banner.id != null} ? '编辑轮播图' : '添加轮播图'"></h3></div>
            <div class="card-body">
                <form th:action="@{/admin/homepage/banners/save}" method="post" th:object="${banner}">
                    <input type="hidden" th:field="*{id}">
                    <div class="form-group"><label>标签 *</label><input type="text" class="form-control" th:field="*{tag}" required placeholder="如：2025年进出口贸易额 5.79 亿元"></div>
                    <div class="form-group"><label>主标题 *</label><input type="text" class="form-control" th:field="*{title}" required></div>
                    <div class="form-group"><label>描述文字</label><textarea class="form-control" th:field="*{description}" rows="3"></textarea></div>
                    <div class="form-row">
                        <div class="form-group"><label>按钮1文字</label><input type="text" class="form-control" th:field="*{ctaText}"></div>
                        <div class="form-group"><label>按钮1链接</label><input type="text" class="form-control" th:field="*{ctaLink}"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>按钮2文字</label><input type="text" class="form-control" th:field="*{ctaText2}"></div>
                        <div class="form-group"><label>按钮2链接</label><input type="text" class="form-control" th:field="*{ctaLink2}"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>排序</label><input type="number" class="form-control" th:field="*{sortOrder}" value="0"></div>
                        <div class="form-group"><label>&nbsp;</label><div class="form-check"><input type="checkbox" th:field="*{active}" id="active"><label for="active">启用</label></div></div>
                    </div>
                    <div class="form-actions"><button type="submit" class="btn btn-primary">保存</button><a href="/admin/homepage/banners" class="btn btn-outline">取消</a></div>
                </form>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/admin/js/admin.js}"></script>
</body></html>
