<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新闻管理 - 国合后台</title>
    <link rel="stylesheet" th:href="@{/admin/css/admin.css}">
</head>
<body>
<div th:replace="admin/fragments/sidebar :: sidebar"></div>
<div class="main-content">
    <div class="top-header"><div class="breadcrumb"><a href="/admin">控制台</a> / <span>新闻管理</span></div></div>
    <div class="content-area">
        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
        <div class="card">
            <div class="card-header"><h3>新闻列表</h3><a href="/admin/news/new" class="btn btn-primary">+ 发布新闻</a></div>
            <div class="card-body">
                <div class="table-wrapper">
                    <table>
                        <thead><tr><th>图标</th><th>标题</th><th>分类</th><th>日期</th><th>置顶</th><th>状态</th><th>操作</th></tr></thead>
                        <tbody>
                        <tr th:each="a : ${articles}">
                            <td th:text="${a.emoji}"></td>
                            <td><strong th:text="${a.title}"></strong></td>
                            <td><span class="badge badge-blue" th:text="${a.category.label}"></span></td>
                            <td th:text="${a.date}"></td>
                            <td>
                                <form th:action="@{'/admin/news/' + ${a.id} + '/toggle-featured'}" method="post" style="display:inline;">
                                    <button type="submit" class="btn btn-sm" th:classappend="${a.featured} ? 'btn-accent' : 'btn-outline'" th:text="${a.featured} ? '★ 置顶' : '☆ 设为置顶'"></button>
                                </form>
                            </td>
                            <td><span class="badge" th:classappend="${a.active} ? 'badge-green' : 'badge-gray'" th:text="${a.active} ? '启用' : '禁用'"></span></td>
                            <td>
                                <div class="btn-group">
                                    <a th:href="@{'/admin/news/' + ${a.id} + '/edit'}" class="btn btn-outline btn-sm">编辑</a>
                                    <form th:action="@{'/admin/news/' + ${a.id} + '/delete'}" method="post" data-confirm="确认删除此新闻？" style="display:inline;">
                                        <button type="submit" class="btn btn-danger btn-sm">删除</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/admin/js/admin.js}"></script>
</body>
</html>
