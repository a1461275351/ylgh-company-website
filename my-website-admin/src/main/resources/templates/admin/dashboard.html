<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>控制台 - 国合后台管理</title>
    <link rel="stylesheet" th:href="@{/admin/css/admin.css}">
</head>
<body>
    <div th:replace="admin/fragments/sidebar :: sidebar"></div>

    <div class="main-content">
        <div class="top-header">
            <div class="breadcrumb"><span>控制台</span></div>
        </div>

        <div class="content-area">
            <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon green">📦</div>
                    <div class="stat-info">
                        <h4 th:text="${productCount}">0</h4>
                        <p>产品总数</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon blue">📰</div>
                    <div class="stat-info">
                        <h4 th:text="${newsCount}">0</h4>
                        <p>新闻文章</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon gold">🚗</div>
                    <div class="stat-info">
                        <h4 th:text="${vehicleCount}">0</h4>
                        <p>车辆出口目的地</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon red">📋</div>
                    <div class="stat-info">
                        <h4 th:text="${pendingInquiryCount}">0</h4>
                        <p>待处理询盘</p>
                    </div>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="card">
                    <div class="card-header">
                        <h3>最新新闻</h3>
                        <a href="/admin/news" class="btn btn-outline btn-sm">查看全部</a>
                    </div>
                    <div class="card-body">
                        <div th:if="${latestNews != null and !latestNews.isEmpty()}">
                            <div th:each="news : ${latestNews}" style="padding: 10px 0; border-bottom: 1px solid #f0f0f0;">
                                <div style="font-size: 14px; font-weight: 500;" th:text="${news.title}"></div>
                                <div style="font-size: 12px; color: #999; margin-top: 4px;">
                                    <span th:text="${news.date}"></span> ·
                                    <span class="badge badge-green" th:text="${news.category.label}"></span>
                                </div>
                            </div>
                        </div>
                        <div th:if="${latestNews == null or latestNews.isEmpty()}" class="empty-state">
                            <p>暂无新闻</p>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3>快捷操作</h3>
                    </div>
                    <div class="card-body">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                            <a href="/admin/products/new" class="btn btn-primary" style="justify-content: center;">+ 添加产品</a>
                            <a href="/admin/news/new" class="btn btn-primary" style="justify-content: center;">+ 发布新闻</a>
                            <a href="/admin/homepage/banners/new" class="btn btn-outline" style="justify-content: center;">+ 添加轮播图</a>
                            <a href="/admin/contact/inquiries" class="btn btn-outline" style="justify-content: center;">查看询盘</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:src="@{/admin/js/admin.js}"></script>
</body>
</html>
